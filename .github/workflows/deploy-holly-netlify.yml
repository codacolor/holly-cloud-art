name: Deploy to Netlify (Holly's account)

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install function dependencies
        run: npm ci

      - name: Deploy site
        run: npx --yes netlify-cli@latest deploy --prod --dir .
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.HOLLY_NETLIFY_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.HOLLY_NETLIFY_SITE_ID }}
